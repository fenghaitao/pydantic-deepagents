apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://localhost:3200
    access: proxy
    isDefault: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: -30m
        spanEndTimeShift: 30m

  - name: VictoriaMetrics
    type: prometheus
    uid: prometheus
    url: http://localhost:8428
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: VictoriaLogs
    type: loki
    uid: loki
    url: http://localhost:9428
    access: proxy
    isDefault: false
    jsonData:
      maxLines: 1000
